name: test-and-build

on:
  push:
    branches:
      - main

jobs:
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Mock test step
        id: test
        run: |
          echo "Mock running tests"
        continue-on-error: true

  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: run-tests
    permissions:
      id-token: write
      contents: write
    outputs:
      build_number: ${{ steps.buildnumber.outputs.build_number }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate build number
        id: buildnumber
        uses: onyxmueller/build-tag-number@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          prefix: ""

      - name: Mock build and push
        id: build-and-push
        run: |
          echo "Mock building and pushing Docker image with build number ${{ steps.buildnumber.outputs.build_number }}"

      - name: Create Git tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${process.env.BUILD_NUMBER}`,
              sha: context.sha
            })
        env:
          BUILD_NUMBER: ${{ steps.buildnumber.outputs.build_number }}

  track-build:
    name: Track Build in Versioner
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Track build
        uses: versioner-io/versioner-github-action@main
        with:
          api_key: ${{ secrets.VERSIONER_API_KEY }}
          product_name: user-api
          version: ${{ needs.build-and-push.outputs.build_number }}
          event_type: build
          status: success
          fail_on_api_error: false
          metadata: |
            {
              "docker_image": ":${{ needs.build-and-push.outputs.build_number }}"
            }
